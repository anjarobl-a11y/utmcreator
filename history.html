
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTM‑Historie</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>UTM‑Historie</h1>

    <div id="history"></div>

    <button onclick="clearHistory()">Historie löschen</button>

    <p class="history-link">
      <a href="index.html">← zurück zum Generator</a>
    </p>

  </div>

  <script>
    const container = document.getElementById("history");
    const history = JSON.parse(localStorage.getItem("utmHistory")) || [];

    if (history.length === 0) {
      container.innerHTML = "<p>Noch keine UTMs generiert.</p>";
    } else {
      history.forEach(url => {
        const input = document.createElement("input");
        input.value = url;
        input.readOnly = true;
        container.appendChild(input);
      });
    }

    function clearHistory() {
      if (confirm("UTM‑Historie wirklich löschen?")) {
        localStorage.removeItem("utmHistory");
        location.reload();
      }
    }
  </script>

</body>
</html>
