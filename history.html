
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UTM History</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"/>

  <!-- Styles -->
  <link rel="stylesheet" href="history.css"/>
</head>

<body class="history-page">

  <div class="container">

    <h1>UTM History</h1>

    <table class="history-table" id="historyTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Tracking URL</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <button onclick="clearHistory()">Clear History</button>

    <p class="history-link">
      <a href="index.html">Back to UTM Generator</a>
    </p>

  </div>

  <script>
    function loadHistory() {
      const tableBody = document.querySelector("#historyTable tbody");
      const history = JSON.parse(localStorage.getItem("utmHistory")) || [];

      tableBody.innerHTML = "";

      const urlCount = {};

      history.forEach(entry => {
        urlCount[entry.url] = (urlCount[entry.url] || 0) + 1;
      });

      history.forEach(entry => {
        const row = document.createElement("tr");

        if (urlCount[entry.url] > 1) {
          row.classList.add("duplicate");
        }

        const dateCell = document.createElement("td");
        const urlCell = document.createElement("td");

        const date = new Date(entry.createdAt).toLocaleString();
        dateCell.textContent = date;

        const input = document.createElement("input");
        input.type = "text";
        input.value = entry.url;
        input.readOnly = true;

        input.addEventListener("click", () => {
          input.select();
          document.execCommand("copy");
        });

        urlCell.appendChild(input);

        row.appendChild(dateCell);
        row.appendChild(urlCell);

        tableBody.appendChild(row);
      });
    }

    function clearHistory() {
      if (confirm("Are you sure you want to delete all entries?")) {
        localStorage.removeItem("utmHistory");
        loadHistory();
      }
    }

    document.addEventListener("DOMContentLoaded", loadHistory);
  </script>

</body>
</html>
