
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UTM history</title>

  <!-- Basis-Styles (für Reset, Font etc.) -->
  <link rel="stylesheet" href="style.css">

  <!-- ✅ Gekapselte History-Styles -->
  <link rel="stylesheet" href="history.css">
</head>

<body class="history-page">

  <div class="container">

    <h1>UTM history</h1>

    <table class="history-table">
      <thead>
        <tr>
          <th>Creation date</th>
          <th>UTM‑URL</th>
        </tr>
      </thead>
      <tbody id="historyBody"></tbody>
    </table>

    <!-- Aktionen -->
    <button onclick="downloadCSV()">Export to CSV</button>
    <button onclick="clearHistory()">Delete history</button>

    <p class="history-link">
      <a href="index.html">← back to UTM Generator</a>
    </p>

  </div>

  <script>
    const history = JSON.parse(localStorage.getItem("utmHistory")) || [];
    const tbody = document.getElementById("historyBody");

    /* =========================
       Duplikate zählen
    ========================= */
    const urlCount = {};
    history.forEach(item => {
      urlCount[item.url] = (urlCount[item.url] || 0) + 1;
    });

    /* =========================
       Tabelle rendern
    ========================= */
    if (history.length === 0) {
      tbody.innerHTML = `
        <tr>
          <td colspan="2">No UTM URLs found.</td>
        </tr>
      `;
    } else {
      history.forEach(item => {
        const tr = document.createElement("tr");

        if (urlCount[item.url] > 1) {
          tr.classList.add("duplicate");
        }

        const date = new Date(item.createdAt);
        const formattedDate =
          date.toLocaleDateString("de-DE") +
          " " +
          date.toLocaleTimeString("de-DE", {
            hour: "2-digit",
            minute: "2-digit"
          });

        tr.innerHTML = `
          <td>${formattedDate}</td>
          <td>
            <input type="text" value="${item.url}" readonly>
          </td>
        `;

        tbody.appendChild(tr);
      });
    }

    /* =========================
       CSV Export
    ========================= */
    function downloadCSV() {
      if (history.length === 0) {
        alert("No data to export found.");
        return;
      }

      const header = ["created_at", "utm_url"];
      const rows = history.map(item => [
        item.createdAt,
        item.url
      ]);

      const csvContent =
        [header, ...rows]
          .map(row =>
            row.map(value =>
              `"${String(value).replace(/"/g, '""')}"`
            ).join(";")
          )
          .join("\n");

      const blob = new Blob([csvContent], {
        type: "text/csv;charset=utf-8;"
      });

      const url = URL.createObjectURL(blob);

      const link = document.createElement("a");
      link.href = url;
      link.download = "utm-history.csv";
      link.click();

      URL.revokeObjectURL(url);
    }

    /* =========================
       Historie löschen
    ========================= */
    function clearHistory() {
      if (confirm("Really delete UTM history?")) {
        localStorage.removeItem("utmHistory");
        location.reload();
      }
    }
  </script>

</body>
</html>
