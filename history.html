
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTM history</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>UTM history</h1>

    <table class="history-table">
      <thead>
        <tr>
          <th>Creation date</th>
          <th>UTM URL</th>
        </tr>
      </thead>
      <tbody id="historyBody"></tbody>
    </table>

    <button onclick="clearHistory()">Delete history</button>

    <p class="history-link">
      <a href="index.html">← back to UTM Generator</a>
    </p>
  </div>

  <script>
    const history = JSON.parse(localStorage.getItem("utmHistory")) || [];
    const tbody = document.getElementById("historyBody");

    // Zähle URLs zur Duplikat-Erkennung
    const urlCount = {};
    history.forEach(item => {
      urlCount[item.url] = (urlCount[item.url] || 0) + 1;
    });

    if (history.length === 0) {
      tbody.innerHTML = `
        <tr>
          <td colspan="2">Noch keine UTMs generiert.</td>
        </tr>
      `;
    } else {
      history.forEach(item => {
        const tr = document.createElement("tr");

        if (urlCount[item.url] > 1) {
          tr.classList.add("duplicate");
        }

        const date = new Date(item.createdAt);
        const formattedDate =
          date.toLocaleDateString("de-DE") +
          " " +
          date.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });

        tr.innerHTML = `
          <td>${formattedDate}</td>
          <td>
            <input type="text" value="${item.url}" readonly>
          </td>
        `;

        tbody.appendChild(tr);
      });
    }

    function clearHistory() {
      if (confirm("UTM‑Historie wirklich löschen?")) {
        localStorage.removeItem("utmHistory");
        location.reload();
      }
    }
  </script>

</body>
</html>
