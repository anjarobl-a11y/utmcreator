<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTM Generator</title>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <!-- ✅ STABILO Logo -->
    <img
      src="https://cdn-live.be-stabilo.com/media/27/56/01/1675089023/STABILO-Logo_RGB_72dpi.png"
      alt="STABILO Logo"
      class="logo"
    >

    <!-- ✅ Headline + kleines Icon -->
    <div class="headline-wrapper">
      <h1>UTM Generator</h1>
      <img
        src="image.png"
        alt=""
        class="hero"
      >
    </div>

    <!-- Formular -->

    <label for="base">Ziel‑URL</label>
    <input
      id="base"
      type="url"
      placeholder="https://www.stabilo.com/de/"
    >

    <label for="source">Source</label>
    <select id="source"></select>

    <label for="medium">Medium</label>
    <select id="medium"></select>

    <label for="campaign">Campaign</label>
    <input
      id="campaign"
      type="text"
      placeholder="example_campaign_2026"
    >

    <button onclick="generateUTM()">
      UTM generieren
    </button>

    <textarea
      id="result"
      readonly
      placeholder="Hier erscheint deine UTM‑URL"
    ></textarea>

    <button onclick="copyUTM()">
      URL kopieren
    </button>

    <!-- Historien-Link -->
    <p class="history-link">
      <a href="history.html">UTM‑Historie ansehen</a>
    </p>

  </div>

  <!-- Script -->
  <script src="script.js"></script>

</body>
</html>
