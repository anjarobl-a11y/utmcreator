
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UTM Generator</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">

    <!-- Logo -->
    <img
      src="https://cdn-live.be-stabilo.com/media/27/56/01/1675089023/STABILO-Logo_RGB_72dpi.png"
      alt="STABILO Logo"
      class="logo"
    >

    <!-- Header -->
    <div class="headline-wrapper">
      <h1>UTM Generator</h1>
      <img src="image.png" alt="" class="hero">
    </div>

    <!-- Formular -->
    <label for="base">Ziel‑URL *</label>
    <input id="base" type="url" placeholder="https://www.stabilo.com/…" />

    <label for="source">Source *</label>
    <select id="source"></select>

    <label for="medium">Medium *</label>
    <select id="medium"></select>

    <label for="campaign">Campaign *</label>
    <input
      id="campaign"
      type="text"
      placeholder="spring_sale_2026"
      aria-describedby="campaign-error"
    >
    <p id="campaign-error" class="field-error" aria-live="polite"></p>

    <!-- Optionale Parameter -->
    <button type="button" class="optional-toggle" aria-expanded="false">
      Optionale Parameter anzeigen
    </button>

    <div class="optional-fields" hidden>
      <label for="term">Keyword (utm_term)</label>
      <input id="term" type="text">

      <label for="content">Content (utm_content)</label>
      <input id="content" type="text">
    </div>

    <button onclick="generateUTM()">UTM generieren</button>

    <textarea
      id="result"
      readonly
      placeholder="Hier erscheint deine UTM‑URL"
    ></textarea>

    <button onclick="copyUTM()">URL kopieren</button>

    <p class="history-link">
      <a href="history.html">UTM‑Historie ansehen</a>
    </p>

  </div>

  <script src="script.js"></script>
</body>
</html>
