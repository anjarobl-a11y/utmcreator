
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTM Generator</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">

    <!-- Logo -->
    <a href="./">
      <img
        src="https://cdn-live.be-stabilo.com/media/27/56/01/1675089023/STABILO-Logo_RGB_72dpi.png"
        alt="STABILO Logo"
        class="logo"
      >
    </a>

    <!-- Headline + Hero -->
    <div class="headline-wrapper">
      <h1>UTM Generator</h1>
      <img src="image.png" alt="" class="hero">
    </div>

    <!-- Formular -->
    <label for="base">Ziel‑URL</label>
    <input id="base" type="url" placeholder="https://www.stabilo.com/…" >

    <label for="source">Source *</label>
    <select id="source"></select>

    <label for="medium">Medium *</label>
    <select id="medium"></select>

    <label for="campaign">Campaign *</label>
    <input id="campaign" type="text" placeholder="spring_sale_2026">

    <!-- ✅ NEU: optionale Felder -->
    <label for="term">Keyword (utm_term)</label>
    <input id="term" type="text" placeholder="z. B. fineliner">

    <label for="content">Content (utm_content)</label>
    <input id="content" type="text" placeholder="z. B. ad_variant_a">

    <button onclick="generateUTM()">UTM generieren</button>

    <textarea id="result" readonly placeholder="Hier erscheint deine UTM‑URL"></textarea>

    <button onclick="copyUTM()">URL kopieren</button>

    <p class="history-link">
      <a href="history.html">UTM‑Historie ansehen</a>
    </p>

  </div>

  <script src="script.js"></script>
</body>
</html>
